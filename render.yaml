# Render deployment configuration for Tolz
#
# After first deploy, set these env vars manually in the Render dashboard:
#   tolz-api    → ALLOWED_ORIGINS=https://<tolz-client-url>.onrender.com
#   tolz-client → VITE_API_URL=https://<tolz-api-url>.onrender.com
#
# The frontend bakes VITE_API_URL at build time, so a redeploy is needed
# after setting it.

services:
  # ── Backend: Express API ───────────────────────────────────────────────────
  - type: web
    name: tolz-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false   # set to your frontend URL after deploy
      - key: APP_BASE_URL
        sync: false   # set to your backend URL, e.g. https://tolz.com (used by URL shortener)
      - key: REDIS_URL
        sync: false   # optional: Render Redis URL for persistent URL shortener links

  # ── Frontend: Vite SPA (static site) ──────────────────────────────────────
  - type: static
    name: tolz-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend URL after deploy
    routes:
      # Rewrite all paths to index.html for client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Content Security Policy — update connect-src if using a custom API domain
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://tolz.com; script-src 'self'; connect-src 'self' https://*.onrender.com; frame-ancestors 'none'"
      # Long-lived cache for hashed assets
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # No cache for HTML entry point
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
